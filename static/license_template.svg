<svg width="595" height="842" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842">
  <!-- White background -->
  <rect width="595" height="842" fill="#ffffff"/>

  <!-- Treble clef watermark (top-left) -->
  <text x="15" y="180" font-family="serif" font-size="160" fill="#e8f5e9" opacity="0.6">&#119070;</text>

  <!-- Wavy staff lines (behind header) -->
  <g opacity="0.15" stroke="#00A86B" stroke-width="0.8" fill="none">
    <path d="M 40,95 Q 150,80 297,95 Q 450,110 560,95"/>
    <path d="M 40,102 Q 150,87 297,102 Q 450,117 560,102"/>
    <path d="M 40,109 Q 150,94 297,109 Q 450,124 560,109"/>
    <path d="M 40,116 Q 150,101 297,116 Q 450,131 560,116"/>
    <path d="M 40,123 Q 150,108 297,123 Q 450,138 560,123"/>
  </g>

  <!-- Music notes scattered (decorative) -->
  <g fill="#00A86B" opacity="0.12" font-family="serif">
    <text x="100" y="85" font-size="28">&#9835;</text>
    <text x="160" y="100" font-size="22">&#9834;</text>
    <text x="220" y="80" font-size="26">&#9835;</text>
    <text x="350" y="90" font-size="24">&#9834;</text>
    <text x="410" y="78" font-size="28">&#9835;</text>
    <text x="470" y="95" font-size="22">&#9834;</text>
    <text x="520" y="82" font-size="26">&#9835;</text>
  </g>

  <!-- Green separator line under subtitle -->
  <line x1="65" y1="145" x2="530" y2="145" stroke="#00A86B" stroke-width="1.5"/>

  <!-- Music notes decoration line (between license nr and info box) -->
  <g fill="#cccccc" font-family="serif" opacity="0.5">
    <text x="65" y="218" font-size="16">&#9835;</text>
    <text x="95" y="213" font-size="14">&#9834;</text>
    <text x="120" y="220" font-size="16">&#9835;</text>
    <text x="150" y="215" font-size="14">&#9834;</text>
    <text x="175" y="218" font-size="16">&#9835;</text>
    <text x="205" y="213" font-size="14">&#9834;</text>
    <text x="230" y="220" font-size="16">&#9835;</text>
    <text x="260" y="215" font-size="14">&#9834;</text>
    <text x="285" y="218" font-size="16">&#9835;</text>
    <text x="315" y="213" font-size="14">&#9834;</text>
    <text x="340" y="220" font-size="16">&#9835;</text>
    <text x="370" y="215" font-size="14">&#9834;</text>
  </g>

  <!-- Wavy staff lines (decoration between license nr and box) -->
  <g opacity="0.08" stroke="#00A86B" stroke-width="0.6" fill="none">
    <path d="M 65,222 Q 150,215 250,222 Q 350,229 400,222"/>
    <path d="M 65,226 Q 150,219 250,226 Q 350,233 400,226"/>
    <path d="M 65,230 Q 150,223 250,230 Q 350,237 400,230"/>
  </g>

  <!-- Company info box border -->
  <rect x="65" y="240" width="466" height="210" rx="2" fill="none" stroke="#cccccc" stroke-width="0.5"/>
  <!-- Vertical divider -->
  <line x1="298" y1="240" x2="298" y2="345" stroke="#cccccc" stroke-width="0.5"/>
  <!-- Horizontal divider (after company/brand rows) -->
  <line x1="65" y1="345" x2="531" y2="345" stroke="#cccccc" stroke-width="0.5"/>

  <!-- Validity ribbon background -->
  <rect x="50" y="475" width="495" height="45" rx="4" fill="#006B45"/>
  <!-- Ribbon fold left -->
  <polygon points="50,475 60,475 50,485" fill="#004D32"/>
  <!-- Ribbon fold right -->
  <polygon points="545,475 535,475 545,485" fill="#004D32"/>

  <!-- "LICENTA VALABILA" badge -->
  <rect x="220" y="460" width="155" height="20" rx="10" fill="#e0f5eb" stroke="#00A86B" stroke-width="0.5"/>

  <!-- Separator line before emitent -->
  <line x1="180" y1="610" x2="415" y2="610" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Bottom decorative music notes -->
  <g fill="#00A86B" opacity="0.06" font-family="serif">
    <text x="80" y="800" font-size="20">&#9835;</text>
    <text x="200" y="810" font-size="18">&#9834;</text>
    <text x="350" y="805" font-size="20">&#9835;</text>
    <text x="480" y="800" font-size="18">&#9834;</text>
  </g>
</svg>
