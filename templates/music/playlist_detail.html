{% extends 'music/base.html' %}

{% block title %}Playlist — SoundFree.ro{% endblock %}

{% block content %}

<!-- PLAYLIST HEADER -->
<div id="pl-header" style="background:linear-gradient(180deg, #1db954 0%, #121212 100%); padding:2rem 1rem 1.5rem;">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
    <div id="pl-cover" style="width:64px;height:64px;border-radius:6px;background:linear-gradient(135deg,#1db954,#191414);display:flex;align-items:center;justify-content:center;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M9 18V5l12-2v13M9 18c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3zm12-2c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/></svg>
    </div>
    <div>
      <h1 id="pl-title" style="font-size:1.5rem;font-weight:800;"></h1>
      <p style="color:var(--text2);font-size:0.85rem;"><span id="pl-song-count">0</span> {{ t.lib_songs_count }}</p>
    </div>
  </div>
  <div style="display:flex;gap:0.5rem;">
    <button class="btn-primary" id="pl-play-all" style="display:none;">
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      {{ t.fav_play_all }}
    </button>
    <button id="pl-add-songs-btn" style="background:none;border:1px solid var(--text3);color:var(--text);padding:0.6rem 1.2rem;border-radius:25px;font-size:0.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:0.35rem;font-family:inherit;">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      {{ t.lib_add_songs }}
    </button>
  </div>
</div>

<!-- PLAYLIST SONGS -->
<div id="pl-songs" style="padding:0 0.5rem;"></div>

<!-- EMPTY STATE -->
<div id="pl-empty" style="text-align:center;padding:3rem 1rem;color:var(--text3);display:none;">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3);margin-bottom:0.75rem;"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  <p style="font-size:0.85rem;">{{ t.lib_add_songs }}</p>
</div>

<!-- ADD SONGS MODAL -->
<div id="add-songs-modal" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);flex-direction:column;">
  <div style="background:var(--bg2);height:100%;display:flex;flex-direction:column;">
    <div style="padding:1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);">
      <h3 style="font-size:1rem;font-weight:700;">{{ t.lib_add_songs }}</h3>
      <button id="close-add-songs" style="background:none;border:none;color:var(--text2);cursor:pointer;padding:8px;">
        <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div style="padding:0.75rem 1rem;">
      <input type="text" id="add-songs-search" placeholder="{{ t.lib_search_placeholder }}"
        style="width:100%;background:var(--bg3);border:none;color:var(--text);padding:0.65rem 1rem;border-radius:8px;font-size:0.9rem;outline:none;font-family:inherit;box-sizing:border-box;">
    </div>
    <div id="add-songs-list" style="flex:1;overflow-y:auto;padding:0 0.5rem;"></div>
  </div>
</div>

<div style="height:2rem;"></div>

{% endblock %}
