{% extends 'music/base.html' %}

{% block title %}{{ t.fav_title }} — SoundFree.ro{% endblock %}

{% block content %}

<!-- FAVORITES HEADER -->
<div style="background:linear-gradient(180deg, #5038a0 0%, #121212 100%); padding:2rem 1rem 1.5rem;">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
    <div style="width:64px;height:64px;border-radius:6px;background:linear-gradient(135deg,#450af5,#c4efd9);display:flex;align-items:center;justify-content:center;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="#fff"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <div>
      <h1 style="font-size:1.5rem;font-weight:800;">{{ t.fav_title }}</h1>
      <p style="color:var(--text2);font-size:0.85rem;"><span id="fav-page-count">0</span> {{ t.fav_subtitle }}</p>
    </div>
  </div>
  <button class="btn-primary" id="fav-play-all" style="display:none;">
    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    {{ t.fav_play_all }}
  </button>
</div>

<!-- FAVORITES LIST -->
<div id="fav-list" style="padding:0 0.5rem;"></div>

<!-- EMPTY STATE -->
<div id="fav-empty" style="text-align:center;padding:4rem 1rem;color:var(--text3);display:none;">
  <div style="font-size:4rem;margin-bottom:1rem;">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text3)"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  </div>
  <h3 style="font-size:1.1rem;color:var(--text2);margin-bottom:0.5rem;">{{ t.fav_empty_title }}</h3>
  <p style="font-size:0.85rem;margin-bottom:1.5rem;">{{ t.fav_empty_desc }}</p>
  <a href="{% url 'music:library' %}" class="btn-primary" style="display:inline-flex;">{{ t.fav_go_library }}</a>
</div>

<div style="height:2rem;"></div>

{% endblock %}
