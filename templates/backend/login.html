<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Backend — SoundFree.ro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#080810; --card:#1a1a2e; --border:#2a2a45; --accent:#7c3aed; --accent2:#a855f7; --text:#e2e8f0; --text2:#94a3b8; --text3:#64748b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .login-wrap { width:100%; max-width:400px; padding:1.5rem; }
    .login-logo { text-align:center; font-size:1.5rem; font-weight:800; margin-bottom:0.25rem; }
    .login-logo span { color:var(--accent2); }
    .login-sub { text-align:center; color:var(--text3); font-size:0.85rem; margin-bottom:2rem; }
    .login-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:2rem; }
    .login-card h2 { font-size:1.1rem; font-weight:700; margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; }
    .form-label { display:block; font-size:0.82rem; font-weight:600; color:var(--text2); margin-bottom:0.4rem; }
    .form-input { width:100%; background:#0f0f1a; border:1px solid var(--border); color:var(--text); padding:0.7rem 1rem; border-radius:8px; font-size:0.875rem; outline:none; font-family:inherit; transition:border 0.2s; }
    .form-input:focus { border-color:var(--accent); }
    .login-btn { width:100%; background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; border:none; padding:0.8rem; border-radius:8px; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:0.5rem; font-family:inherit; transition:opacity 0.2s; }
    .login-btn:hover { opacity:0.88; }
    .error-msg { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); color:#ef4444; padding:0.75rem 1rem; border-radius:8px; font-size:0.82rem; margin-bottom:1rem; }
    .back-link { text-align:center; margin-top:1.25rem; font-size:0.82rem; }
    .back-link a { color:var(--text2); text-decoration:none; }
    .back-link a:hover { color:var(--accent2); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">Sound<span>Free</span>.ro</div>
  <div class="login-sub">Panou de administrare</div>
  <div class="login-card">
    <h2>🔐 Autentificare</h2>
    {% if form.errors %}
    <div class="error-msg">❌ Username sau parolă incorecte. Încearcă din nou.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="admin" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label">Parolă</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="login-btn">Intră în backend →</button>
    </form>
  </div>
  <div class="back-link"><a href="{% url 'music:home' %}">← Înapoi pe site</a></div>
</div>
</body>
</html>
